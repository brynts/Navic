name: Build Navic

on:
  push:
    paths:
      - composeApp/**
      - gradle/**
      - iosApp/**
      - build.gradle.kts
      - settings.gradle.kts
      - .github/workflows/build.yml
      - "!**/strings.xml"
    tags:
      - 'v*'
    branches:
      - '*'
  pull_request:
    paths:
      - composeApp/**
      - gradle/**
      - iosApp/**
      - build.gradle.kts
      - settings.gradle.kts
      - .github/workflows/build.yml
      - "!**/strings.xml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Cache konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run Gradle tasks
        run: ./gradlew :composeApp:generateValkyrieImageVector

      - name: Build IPA
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "iosApp.xcarchive" \
            CODE_SIGN_ENTITLEMENTS="iosApp/entitlements.xml" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload

          APP_PATH=$(find "iosApp.xcarchive/Products/Applications" -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/

          zip -r "Navic.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: navic-release-ios
          path: Navic.ipa
          compression-level: 0

  upload-artifacts-to-discord:
    name: Upload Artifacts to Discord
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [ build-ipa ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
      - name: Post artifacts to Discord webhook
        shell: bash
        if: env.CI_BUILD_WEBHOOK
        env:
          CI_BUILD_WEBHOOK: ${{ secrets.CI_BUILD_WEBHOOK }}
        run: |
          shopt -s nullglob globstar

          files=()
          i=1
          for file in **/*.ipa; do
            files+=("-F file${i}=@${file}")
            ((i++))
          done

          if (( ${#files[@]} == 0 )); then
            echo "No files to upload"
            exit 0
          fi

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          payload=$(jq -n --arg content "Builds for [${GITHUB_SHA::7}](<$run_url>)" '{$content}')

          curl -XPOST "$CI_BUILD_WEBHOOK" -F "payload_json=$payload" "${files[@]}"

  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [ build-ipa ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob globstar

          gh release create "$GITHUB_REF_NAME" **/*.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --draft --generate-notes
